name: Deploy to Neocities
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Upload projects.html to Neocities via API
        env:
          NEOCITIES_API_TOKEN: ${{ secrets.NEOCITIES_API_TOKEN }}
        run: |
          set -euo pipefail
          FILE=public/neocities-shuripurin/projects.html
          if [ -f "$FILE" ]; then
            echo "Uploading $FILE to Neocities..."
            curl -s -X POST \
              -F "api_key=${NEOCITIES_API_TOKEN}" \
              -F "file=@${FILE};filename=projects.html" \
              https://neocities.org/api/upload | sed -n '1,200p'
          else
            echo "Error: $FILE not found" >&2
            exit 1
          fi
